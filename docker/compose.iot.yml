services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ../iot/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ../iot/mosquitto/data:/mosquitto/data
      - ../iot/mosquitto/log:/mosquitto/log

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:2.8.0
    restart: unless-stopped
    depends_on:
      - mosquitto
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    expose:
      - "8080"
    volumes:
      - ../iot/zigbee2mqtt/data:/app/data
    environment:
      - TZ=Europe/Amsterdam
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zigbee.rule=Host(`zigbee.home`)"
      - "traefik.http.services.zigbee.loadbalancer.server.port=8080"

  iot-hub:
    build:
      context: ../../iot-hub
    restart: unless-stopped
    depends_on:
      - mosquitto
    expose:
      - "3000"
    env_file:
      - ../env/.iot.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iot-hub.rule=Host(`iot-hub.home`)"
      - "traefik.http.routers.iot-hub-api.rule=Host(`iot.home`) && PathPrefix(`/api`)"
      - "traefik.http.routers.iot-hub-api.priority=100"
      - "traefik.http.routers.iot-hub-api.middlewares=iot-hub-strip-api"
      - "traefik.http.middlewares.iot-hub-strip-api.stripprefix.prefixes=/api"
      - "traefik.http.services.iot-hub.loadbalancer.server.port=3000"

  iot-dashboard:
    build:
      context: ../../iot-dashboard
      args:
        PUBLIC_IOT_API_BASE_URL: /api
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iot-dashboard.rule=Host(`iot.home`)"
      - "traefik.http.routers.iot-dashboard.priority=1"
      - "traefik.http.services.iot-dashboard.loadbalancer.server.port=80"

networks:
  default:
    external: true
    name: infra
